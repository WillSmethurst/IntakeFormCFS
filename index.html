<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Educational Intake Form</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://releases.transloadit.com/uppy/v3.21.0/uppy.min.css" rel="stylesheet" />
  <script src="https://releases.transloadit.com/uppy/v3.21.0/uppy.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { margin: 0; padding: 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;


function IntakeForm() {
  const [formData, setFormData] = useState({});
  const [currentSection, setCurrentSection] = useState(0);
  const [pendingCollegeName, setPendingCollegeName] = useState('');
  const [pendingCollegeCityState, setPendingCollegeCityState] = useState('');
  const formRef = useRef(null);

  // ── Resume / email gate ────────────────────────────────────────────────────
  const [appStage, setAppStage] = useState('intro'); // 'intro' | 'email' | 'form'
  const [clientEmail, setClientEmail] = useState('');
  const [emailInput, setEmailInput] = useState('');
  const [resumeLoading, setResumeLoading] = useState(false);
  const [resumeFound, setResumeFound] = useState(null); // { formData, currentSection } | null
  // ── End resume state ───────────────────────────────────────────────────────

  // ── Google Sheets integration ──────────────────────────────────────────────
  // Paste your Apps Script Web App URL below after deploying GoogleAppsScript.js
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxFR8CLOYpGENlLenzRYcN6Bu6ax4iLHPjA7j_vH2Bs7Lcqx1jD9P0Gp8h3FfDpzn-xFA/exec';

  const [saveStatus, setSaveStatus] = useState('');
  const [devMode, setDevMode] = useState(false);

  const [sessionId] = useState(() => {
    try {
      let id = localStorage.getItem('intakeFormSessionId');
      if (!id) {
        id = 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('intakeFormSessionId', id);
      }
      return id;
    } catch(e) {
      return 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    }
  });

  const saveToSheet = (data, isFinal, resumeSection) => {
    if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') return;
    try {
      setSaveStatus('saving');
      const payload = encodeURIComponent(JSON.stringify({
        sessionId: sessionId,
        timestamp: new Date().toISOString(),
        formData: data,
        isFinal: !!isFinal,
        clientEmail: clientEmail || '',
        resumeSection: resumeSection ?? currentSection
      }));
      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'payload=' + payload
      }).then(() => {
        setSaveStatus('saved');
        setTimeout(() => setSaveStatus(''), 2500);
      }).catch(() => {
        setSaveStatus('error');
        setTimeout(() => setSaveStatus(''), 2500);
      });
    } catch(e) {
      console.error('Sheet save error:', e);
    }
  };

  // ── Email resume lookup (JSONP to avoid CORS) ──────────────────────────────
  const lookupEmail = (email) => {
    return new Promise((resolve) => {
      const cbName = 'resumeCb_' + Date.now();
      const timeoutId = setTimeout(() => {
        delete window[cbName];
        resolve({ status: 'not_found' });
      }, 10000);
      window[cbName] = (data) => {
        clearTimeout(timeoutId);
        delete window[cbName];
        if (script.parentNode) script.parentNode.removeChild(script);
        resolve(data);
      };
      const script = document.createElement('script');
      script.onerror = () => {
        clearTimeout(timeoutId);
        delete window[cbName];
        resolve({ status: 'not_found' });
      };
      script.src = APPS_SCRIPT_URL + '?action=lookup&email=' + encodeURIComponent(email) + '&callback=' + cbName;
      document.head.appendChild(script);
    });
  };
  // ── End Google Sheets integration ──────────────────────────────────────────

  useEffect(() => {
    const handleWheel = () => {
      const el = document.activeElement;
      // If a number input is focused, blur it so wheel scrolling doesn't change its value
      if (el && el.tagName === 'INPUT' && el.type === 'number') {
        el.blur();
      }
    };

    // passive true keeps scrolling smooth (we're not preventing scroll, just blurring)
    window.addEventListener('wheel', handleWheel, { passive: true });

    return () => {
      window.removeEventListener('wheel', handleWheel);
    };
  }, []);

  const updateField = (field, value) => {
    setFormData(prev => ({ ...prev, [field]: value }));
  };

  const getColleges = () =>
    Array.isArray(formData.collegesUnderConsideration) ? formData.collegesUnderConsideration : [];

  const setColleges = (next) => updateField('collegesUnderConsideration', next);

  const housingCodes = ['On Campus', 'Off Campus', 'With Parent(s)', 'Other'];

  const addCollegeRow = () => {
    const name = (pendingCollegeName || '').trim();
    if (!name) return;

    const next = [
      ...getColleges(),
      {
        collegeName: name,
        cityState: (pendingCollegeCityState || '').trim(),
        housingCode: 'On Campus',
        alCoa: '',
        alGiftAid: ''
      }
    ];

    setColleges(next);
    setPendingCollegeName('');
    setPendingCollegeCityState('');
  };

  const updateCollegeRow = (index, patch) => {
    const next = [...getColleges()];
    next[index] = { ...next[index], ...patch };
    setColleges(next);
  };

  const deleteCollegeRow = (index) => {
    const next = [...getColleges()];
    next.splice(index, 1);
    setColleges(next);
  };

  const usStates = [
    'AL', 'AK', 'AZ', 'AR', 'CA', 'CO', 'CT', 'DE', 'FL', 'GA',
    'HI', 'ID', 'IL', 'IN', 'IA', 'KS', 'KY', 'LA', 'ME', 'MD',
    'MA', 'MI', 'MN', 'MS', 'MO', 'MT', 'NE', 'NV', 'NH', 'NJ',
    'NM', 'NY', 'NC', 'ND', 'OH', 'OK', 'OR', 'PA', 'RI', 'SC',
    'SD', 'TN', 'TX', 'UT', 'VT', 'VA', 'WA', 'WV', 'WI', 'WY'
  ];

  const currentYear = new Date().getFullYear();
  const gradYears = Array.from({ length: 11 }, (_, i) => currentYear - 5 + i);

  const sections = [
    { id: 'intro', title: 'Welcome' },
    { id: 'section1', title: 'Student — Basic Information' },
    { id: 'section2', title: 'Student — Academic & Enrollment Info' },
    { id: 'section3', title: 'Parents / Guardians' },
    { id: 'section4', title: 'Family Household Overview' },
    { id: 'section5', title: 'Student Income' },
    { id: 'section6', title: 'Student Assets' },
    { id: 'section7', title: 'Student Investments (Detailed)' },
    { id: 'section8', title: 'Parent Income' },
    { id: 'section9', title: 'Family Benefits (Past 24 Months)' },
    { id: 'section10', title: 'Parent Assets' },
    { id: 'section11', title: 'Parent Assets — Continued (Investments)' },
    { id: 'section12', title: 'Parent Assets — Continued (Property & Equity)' },
    { id: 'section13', title: 'Parent & Student - Worksheet A Information' },
    { id: 'section14', title: 'Parent & Student - Worksheet B Information' },
    { id: 'section15', title: 'Parent & Student - Worksheet C Information' },
    { id: 'section16', title: 'Life Insurance & Debts' },
    { id: 'section17', title: 'Non-Custodial Parent (if applicable)' },
    { id: 'section18', title: 'Colleges Under Consideration, Award Letter / Funding Evaluations' },
    { id: 'section19', title: 'Dependency Status' },
    { id: 'section20', title: 'Upload Award Letters' },
    { id: 'acknowledgment', title: 'Final Acknowledgment' },
    { id: 'thankyou', title: 'Thank You' }
  ];

  return (
    <div style={{
      minHeight: '100vh',
      background: 'linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%)',
      padding: '40px 20px',
      fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'
    }}>
      <div style={{
        maxWidth: '900px',
        margin: '0 auto',
        background: 'white',
        borderRadius: '12px',
        boxShadow: '0 4px 20px rgba(0,0,0,0.08)',
        overflow: 'hidden'
      }}>
        {/* Header */}
        {sections[currentSection].id !== 'intro' && (
        <div style={{
          background: 'linear-gradient(135deg, #064E3B 0%, #0a3528 100%)',
          padding: '40px',
          color: 'white',
          textAlign: 'center'
        }}>
          <h1 style={{
            margin: 0,
            fontSize: '32px',
            fontWeight: '600',
            fontFamily: 'Georgia, serif',
            letterSpacing: '-0.5px'
          }}>
            Educational Intake Form
          </h1>
          <p style={{
            margin: '12px 0 0',
            opacity: 0.95,
            fontSize: '15px'
          }}>
            Please complete all sections accurately for financial aid analysis
          </p>
        </div>
        )}

        {sections[currentSection].id !== 'intro' && sections[currentSection].id !== 'thankyou' && (
          <div style={{
            padding: '30px 40px 20px',
            borderBottom: '1px solid #e5e7eb'
          }}>
            <div style={{
              display: 'flex',
              justifyContent: 'space-between',
              marginBottom: '12px'
            }}>
              <span style={{ fontSize: '14px', color: '#6b7280', fontWeight: '500' }}>
                {sections[currentSection].id === 'acknowledgment'
                  ? 'Final Step: Acknowledgment'
                  : `Section ${currentSection} of ${sections.length - 3}`
                }
              </span>
              <span style={{ fontSize: '14px', color: '#6b7280', fontWeight: '500' }}>
                {Math.round(((currentSection + 1) / (sections.length - 1)) * 100)}% Complete
              </span>
            </div>
            <div style={{
              width: '100%',
              height: '8px',
              background: '#e5e7eb',
              borderRadius: '4px',
              overflow: 'hidden'
            }}>
              <div style={{
                width: `${((currentSection + 1) / (sections.length - 1)) * 100}%`,
                height: '100%',
                background: 'linear-gradient(90deg, #064E3B, #0a3528)',
                transition: 'width 0.3s ease',
                borderRadius: '4px'
              }} />
            </div>
          </div>
        )}

        {/* Form Content */}
        <div style={{ padding: '40px' }}>
          <h2 style={{
            fontSize: '24px',
            fontWeight: '600',
            color: '#111827',
            marginBottom: '30px',
            fontFamily: 'Georgia, serif',
            borderBottom: '2px solid #0a3528',
            paddingBottom: '12px'
          }}>
            {sections[currentSection].title}
          </h2>

          {sections[currentSection].id === 'intro' && (
            appStage === 'intro' ? (
            <PremiumHeroShell>
              <div
                style={{
                  maxWidth: '720px',
                  margin: '0 auto',
                  background: 'rgba(255,255,255,0.92)',
                  border: '2px solid #D4AF37',
                  borderRadius: '12px',
                  padding: '40px',
                  boxShadow: '0 10px 30px rgba(0,0,0,0.10)',
                  backdropFilter: 'blur(6px)',
                  WebkitBackdropFilter: 'blur(6px)',
                }}
              >
              <h3 style={{
                fontSize: '26px',
                fontWeight: '700',
                color: '#1B2845',
                marginBottom: '8px',
                marginTop: 0,
                fontFamily: 'Georgia, serif'
              }}>
                Why This Information Matters
              </h3>
              <div style={{
                height: '3px',
                width: '64px',
                background: '#D4AF37',
                borderRadius: '999px',
                marginTop: '14px',
                marginBottom: '22px'
              }}></div>
              
              <p style={{
                fontSize: '16px',
                lineHeight: '1.7',
                color: '#111827',
                marginBottom: '20px'
              }}>
                College is not priced like a traditional consumer purchase. Costs, aid eligibility, and pricing outcomes vary based on family structure, income, assets, and the schools a student is considering.
              </p>

              <p style={{
                fontSize: '16px',
                lineHeight: '1.7',
                color: '#111827',
                marginBottom: '20px'
              }}>
                The information collected in this intake allows us to evaluate your situation accurately and provide guidance rooted in how college pricing actually works. While we cannot guarantee savings or specific outcomes, we do guarantee clarity — ensuring your family understands whether you are paying what you should be paying, based on the rules and structures in place.
              </p>

              <p style={{
                fontSize: '16px',
                lineHeight: '1.7',
                color: '#111827',
                marginBottom: '20px'
              }}>
                This process is educational in nature and does not constitute financial, tax, or legal advice.
              </p>

              <p style={{
                fontSize: '15px',
                lineHeight: '1.7',
                color: '#374151',
                marginBottom: '28px'
              }}>
                <strong>Time to complete:</strong> approximately 20–30 minutes. Estimates are acceptable where exact figures are unavailable. Accuracy improves the usefulness of the analysis.
              </p>

              <div style={{
                background: '#1B2845',
                color: '#FFFFFF',
                padding: '24px',
                borderRadius: '8px',
                borderLeft: '4px solid #D4AF37',
                marginBottom: '32px'
              }}>
                <p style={{
                  fontSize: '17px',
                  lineHeight: '1.6',
                  margin: 0,
                  fontStyle: 'italic'
                }}>
                  "We don't guarantee more gift aid — we guarantee peace of mind, knowing you're paying what you should, not thousands more than necessary."
                </p>
              </div>

              <button
                onClick={() => {
                  setAppStage('email');
                  window.scrollTo({ top: 0, behavior: 'smooth' });
                }}
                style={{
                  width: '100%',
                  padding: '14px 22px',
                  fontSize: '18px',
                  fontWeight: '700',
                  color: '#1B2845',
                  background: '#D4AF37',
                  border: 'none',
                  borderRadius: '10px',
                  cursor: 'pointer',
                  transition: 'all 0.2s ease',
                  boxShadow: '0 6px 14px rgba(0,0,0,0.10)'
                }}
                onMouseOver={(e) => {
                  e.target.style.background = '#c49d2f';
                  e.target.style.transform = 'translateY(-2px)';
                  e.target.style.boxShadow = '0 8px 18px rgba(0,0,0,0.15)';
                }}
                onMouseOut={(e) => {
                  e.target.style.background = '#D4AF37';
                  e.target.style.transform = 'translateY(0)';
                  e.target.style.boxShadow = '0 6px 14px rgba(0,0,0,0.10)';
                }}
              >
                Continue to Questionnaire
              </button>
            </div>
            </PremiumHeroShell>
            ) : (
            /* ── Email / Resume Page ─────────────────────────────────────── */
            <PremiumHeroShell>
              <div style={{
                maxWidth: '560px',
                margin: '0 auto',
                background: 'rgba(255,255,255,0.92)',
                border: '2px solid #D4AF37',
                borderRadius: '12px',
                padding: '40px',
                boxShadow: '0 10px 30px rgba(0,0,0,0.10)',
                backdropFilter: 'blur(6px)',
                WebkitBackdropFilter: 'blur(6px)',
              }}>
                {resumeFound ? (
                  /* ── Resume prompt ── */
                  <div>
                    <div style={{ fontSize: '40px', textAlign: 'center', marginBottom: '16px' }}>👋</div>
                    <h3 style={{
                      fontSize: '24px', fontWeight: '700', color: '#1B2845',
                      marginBottom: '8px', marginTop: 0, fontFamily: 'Georgia, serif',
                      textAlign: 'center'
                    }}>
                      Welcome Back!
                    </h3>
                    <div style={{
                      height: '3px', width: '64px', background: '#D4AF37',
                      borderRadius: '999px', margin: '14px auto 20px'
                    }} />
                    <p style={{ fontSize: '15px', color: '#374151', lineHeight: '1.6', textAlign: 'center', marginBottom: '28px' }}>
                      We found your saved progress for <strong>{clientEmail}</strong>. Would you like to pick up where you left off?
                    </p>
                    <button
                      onClick={() => {
                        setFormData(resumeFound.formData || {});
                        setCurrentSection(resumeFound.currentSection || 1);
                        setResumeFound(null);
                        setAppStage('form');
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                      }}
                      style={{
                        width: '100%', padding: '14px 22px', fontSize: '16px',
                        fontWeight: '700', color: 'white', background: '#064E3B',
                        border: 'none', borderRadius: '10px', cursor: 'pointer',
                        marginBottom: '12px', boxShadow: '0 4px 10px rgba(0,0,0,0.12)'
                      }}
                    >
                      ✅ Resume Where I Left Off
                    </button>
                    <button
                      onClick={() => {
                        setFormData({});
                        setCurrentSection(1);
                        setResumeFound(null);
                        setAppStage('form');
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                      }}
                      style={{
                        width: '100%', padding: '12px 22px', fontSize: '15px',
                        fontWeight: '600', color: '#374151', background: 'white',
                        border: '2px solid #e5e7eb', borderRadius: '10px', cursor: 'pointer'
                      }}
                    >
                      Start Fresh Instead
                    </button>
                  </div>
                ) : (
                  /* ── Email entry ── */
                  <div>
                    <h3 style={{
                      fontSize: '26px', fontWeight: '700', color: '#1B2845',
                      marginBottom: '8px', marginTop: 0, fontFamily: 'Georgia, serif'
                    }}>
                      Let's Get You Started
                    </h3>
                    <div style={{
                      height: '3px', width: '64px', background: '#D4AF37',
                      borderRadius: '999px', marginTop: '14px', marginBottom: '22px'
                    }} />
                    <p style={{ fontSize: '15px', color: '#374151', lineHeight: '1.6', marginBottom: '28px' }}>
                      Enter your email address below. If you've started this form before, we'll pick up right where you left off. Otherwise, you'll begin fresh.
                    </p>
                    <div style={{ marginBottom: '20px' }}>
                      <label style={{
                        display: 'block', fontSize: '14px', fontWeight: '600',
                        color: '#374151', marginBottom: '8px'
                      }}>
                        Email Address <span style={{ color: '#dc2626' }}>*</span>
                      </label>
                      <input
                        type="email"
                        placeholder="your@email.com"
                        value={emailInput}
                        onChange={(e) => setEmailInput(e.target.value)}
                        onKeyDown={(e) => {
                          if (e.key === 'Enter' && emailInput.trim()) {
                            e.preventDefault();
                            const email = emailInput.trim();
                            setClientEmail(email);
                            setResumeLoading(true);
                            lookupEmail(email).then((result) => {
                              setResumeLoading(false);
                              if (result.status === 'found') {
                                setResumeFound(result);
                              } else {
                                setFormData({});
                                setCurrentSection(1);
                                setAppStage('form');
                                window.scrollTo({ top: 0, behavior: 'smooth' });
                              }
                            });
                          }
                        }}
                        style={{
                          width: '100%', padding: '13px 16px', fontSize: '15px',
                          border: '2px solid #e5e7eb', borderRadius: '8px',
                          outline: 'none', fontFamily: 'inherit', boxSizing: 'border-box'
                        }}
                      />
                    </div>
                    <button
                      disabled={resumeLoading || !emailInput.trim()}
                      onClick={() => {
                        const email = emailInput.trim();
                        if (!email) return;
                        setClientEmail(email);
                        setResumeLoading(true);
                        lookupEmail(email).then((result) => {
                          setResumeLoading(false);
                          if (result.status === 'found') {
                            setResumeFound(result);
                          } else {
                            setFormData({});
                            setCurrentSection(1);
                            setAppStage('form');
                            window.scrollTo({ top: 0, behavior: 'smooth' });
                          }
                        });
                      }}
                      style={{
                        width: '100%', padding: '14px 22px', fontSize: '17px',
                        fontWeight: '700', color: resumeLoading || !emailInput.trim() ? '#9ca3af' : '#1B2845',
                        background: resumeLoading || !emailInput.trim() ? '#e5e7eb' : '#D4AF37',
                        border: 'none', borderRadius: '10px',
                        cursor: resumeLoading || !emailInput.trim() ? 'not-allowed' : 'pointer',
                        transition: 'all 0.2s ease', boxShadow: '0 6px 14px rgba(0,0,0,0.10)'
                      }}
                    >
                      {resumeLoading ? '⏳ Checking...' : 'Continue →'}
                    </button>
                    <p style={{
                      fontSize: '12px', color: '#9ca3af', textAlign: 'center',
                      marginTop: '16px', marginBottom: 0
                    }}>
                      Your email is used only to save and restore your progress.
                    </p>
                  </div>
                )}
              </div>
            </PremiumHeroShell>
            )
          )}

          {currentSection === 1 && (
            <form ref={formRef} onSubmit={(e) => e.preventDefault()}>
              <div style={{ marginBottom: '32px' }}>
                <h3 style={subsectionStyle}>Student Identity</h3>
                <FormField label="Student First Name" required>
                  <input
                    type="text"
                    required
                    style={inputStyle}
                    value={formData.studentFirstName || ''}
                    onChange={(e) => updateField('studentFirstName', e.target.value)}
                  />
                </FormField>
                <FormField label="Student Last Name" required>
                  <input
                    type="text"
                    required
                    style={inputStyle}
                    value={formData.studentLastName || ''}
                    onChange={(e) => updateField('studentLastName', e.target.value)}
                  />
                </FormField>
                <FormField label="Middle Initial">
                  <input
                    type="text"
                    maxLength="1"
                    style={inputStyle}
                    value={formData.middleInitial || ''}
                    onChange={(e) => updateField('middleInitial', e.target.value)}
                  />
                </FormField>
              </div>

              <div style={{ marginBottom: '32px' }}>
                <h3 style={subsectionStyle}>Contact & Address</h3>
                <FormField label="Street Address" required>
                  <input
                    type="text"
                    required
                    style={inputStyle}
                    value={formData.streetAddress || ''}
                    onChange={(e) => updateField('streetAddress', e.target.value)}
                  />
                </FormField>
                <FormField label="City" required>
                  <input
                    type="text"
                    required
                    style={inputStyle}
                    value={formData.city || ''}
                    onChange={(e) => updateField('city', e.target.value)}
                  />
                </FormField>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '20px' }}>
                  <FormField label="State" required>
                    <select
                      required
                      style={inputStyle}
                      value={formData.state || ''}
                      onChange={(e) => updateField('state', e.target.value)}
                    >
                      <option value="">Select State</option>
                      {usStates.map(state => (
                        <option key={state} value={state}>{state}</option>
                      ))}
                    </select>
                  </FormField>
                  <FormField label="ZIP Code" required>
                    <input
                      type="text"
                      required
                      pattern="[0-9]{5}"
                      style={inputStyle}
                      value={formData.zipCode || ''}
                      onChange={(e) => updateField('zipCode', e.target.value)}
                    />
                  </FormField>
                </div>
                <FormField label="Home Phone">
                  <input
                    type="tel"
                    style={inputStyle}
                    value={formData.homePhone || ''}
                    onChange={(e) => updateField('homePhone', e.target.value)}
                  />
                </FormField>
              </div>

              <div style={{ marginBottom: '32px' }}>
                <h3 style={subsectionStyle}>Student Status</h3>
                <FormField label="High School Graduation Year" required>
                  <select
                    required
                    style={inputStyle}
                    value={formData.gradYear || ''}
                    onChange={(e) => updateField('gradYear', e.target.value)}
                  >
                    <option value="">Select Year</option>
                    {gradYears.map(year => (
                      <option key={year} value={year}>{year}</option>
                    ))}
                  </select>
                </FormField>
                <FormField label="Date of Birth" required>

function DateInput({ value, onChange, required, disabled }) {
  const [error, setError] = React.useState('');

  const mdyToIso = (mdy) => {
    if (!mdy) return '';
    const pattern = /^(0[1-9]|1[0-2])\/(0[1-9]|[12][0-9]|3[01])\/\d{4}$/;
    if (!pattern.test(mdy)) return '';
    const parts = mdy.split('/');
    return `${parts[2]}-${parts[0]}-${parts[1]}`;
  };

  const handleTextChange = (e) => {
    let input = e.target.value;
    
    // Strip all non-digits
    const digitsOnly = input.replace(/\D/g, '');
    
    // Limit to 8 digits
    const limited = digitsOnly.slice(0, 8);
    
    // Auto-format with slashes
    let formatted = '';
    if (limited.length >= 1) {
      formatted = limited.slice(0, 2);
    }
    if (limited.length >= 3) {
      formatted += '/' + limited.slice(2, 4);
    }
    if (limited.length >= 5) {
      formatted += '/' + limited.slice(4, 8);
    }
    
    onChange(formatted);
    setError('');
  };

  const handleTextBlur = (e) => {
    const val = e.target.value;
    if (val && !mdyToIso(val)) {
      setError('Please use format: mm/dd/yyyy');
    } else {
      setError('');
    }
  };

  return (
    <div>
      <input
        type="text"
        placeholder="mm/dd/yyyy"
        inputMode="numeric"
        pattern="^(0[1-9]|1[0-2])\/(0[1-9]|[12][0-9]|3[01])\/\d{4}$"
        required={required}
        disabled={disabled}
        style={inputStyle}
        value={value || ''}
        onChange={handleTextChange}
        onBlur={handleTextBlur}
      />
      {error && (
        <div style={{ color: '#dc2626', fontSize: '12px', marginTop: '4px' }}>
          {error}
        </div>
      )}
    </div>
  );
}

function UppyUploadSection({ clientEmail, sessionId, uploads, onUploadsChange, noLetters, onNoLettersChange }) {
  const containerRef = React.useRef(null);
  const uploadsRef = React.useRef(uploads);
  const WORKER_URL = 'https://intake-upload-worker.will-c65.workers.dev';

  React.useEffect(() => {
    uploadsRef.current = uploads;
  }, [uploads]);

  React.useEffect(() => {
    if (!window.Uppy || !containerRef.current) return;

    const uppy = new window.Uppy.Uppy({
      restrictions: {
        maxFileSize: 25 * 1024 * 1024,
        allowedFileTypes: ['application/pdf', 'image/jpeg', 'image/png', '.pdf', '.jpg', '.jpeg', '.png'],
        maxNumberOfFiles: 20
      },
      autoProceed: false
    });

    uppy.use(window.Uppy.Dashboard, {
      target: containerRef.current,
      inline: true,
      height: 350,
      showProgressDetails: true,
      note: 'PDF, JPG, or PNG only · Max 25 MB per file',
      proudlyDisplayPoweredByUppy: false
    });

    uppy.use(window.Uppy.XHRUpload, {
      endpoint: WORKER_URL,
      method: 'POST',
      formData: true,
      fieldName: 'file',
      getResponseData(responseText) {
        try { return JSON.parse(responseText); } catch { return {}; }
      },
      headers: {
        'X-Client-Email': clientEmail || '',
        'X-Session-Id': sessionId || ''
      }
    });

    uppy.on('upload-success', (file, response) => {
      const key = response.body?.key || file.name;
      const updated = [...uploadsRef.current, { name: file.name, key }];
      uploadsRef.current = updated;
      onUploadsChange(updated);
    });

    uppy.on('upload-error', (file, error) => {
      console.error('Upload error for', file.name, error);
    });

    return () => {
      try { uppy.destroy(); } catch(e) {}
    };
  }, []);

  return (
    <div>
      <p style={{ color: '#374151', fontSize: '15px', lineHeight: '1.7', marginBottom: '20px' }}>
        Please upload your student's award letter(s) from each college they have been accepted to.
        You may upload multiple files — one per college. Accepted formats: <strong>PDF, JPG, PNG</strong>. Maximum <strong>25 MB</strong> per file.
      </p>

      <div ref={containerRef} style={{ marginBottom: '20px' }} />

      {uploads.length > 0 && (
        <div style={{
          background: '#f0fdf4',
          border: '1px solid #bbf7d0',
          borderRadius: '8px',
          padding: '14px 18px',
          marginBottom: '16px',
          color: '#166534',
          fontSize: '14px',
          fontWeight: '500'
        }}>
          ✓ {uploads.length} file{uploads.length !== 1 ? 's' : ''} successfully uploaded
        </div>
      )}

      <div style={{
        background: '#fffbeb',
        border: '1px solid #fde68a',
        borderRadius: '8px',
        padding: '16px 20px',
        marginTop: '8px'
      }}>
        <label style={{
          display: 'flex',
          alignItems: 'flex-start',
          gap: '10px',
          cursor: 'pointer',
          fontSize: '14px',
          color: '#374151',
          lineHeight: '1.5'
        }}>
          <input
            type="checkbox"
            checked={noLetters}
            onChange={(e) => onNoLettersChange(e.target.checked)}
            style={{ width: '16px', height: '16px', marginTop: '2px', cursor: 'pointer', flexShrink: 0 }}
          />
          <span>
            <strong>I do not yet have award letters to upload</strong> — checking this box will allow you to proceed without uploading files now. You can submit your award letters to us directly when you receive them.
          </span>
        </label>
      </div>
    </div>
  );
}
